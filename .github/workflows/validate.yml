name: Validate skill

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -s tests -v
      - run: python -m py_compile scripts/*.py tests/*.py
      - name: Validate skill metadata
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          text = Path("SKILL.md").read_text()
          assert re.match(r"^---\nname: [a-z0-9-]+\ndescription: .+\n---\n", text)
          PY
      - name: Check local Markdown links
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          for source in Path(".").rglob("*.md"):
              for target in re.findall(r"\[[^]]+\]\(([^)#]+)(?:#[^)]+)?\)", source.read_text()):
                  if "://" not in target:
                      assert (source.parent / target).resolve().exists(), f"{source}: missing {target}"
          PY
